apiVersion: agents.kruise.io/v1alpha1
kind: SandboxSet
metadata:
  name: qoder-cli-sbs
  namespace: default
spec:
  # Pre-warming pool size; adjust based on expected concurrent usage
  replicas: 3
  # Use the built-in agent-runtime injection — the controller auto-injects
  # the envd sidecar for E2B-compatible remote operation.
  runtimes:
  - name: agent-runtime
  template:
    metadata:
      labels:
        app: qoder-cli
    spec:
      containers:
        - name: qoder-cli
          # Replace with your own registry/image tag after building
          image: your-registry/qoder-cli:v0.1
          resources:
            requests:
              cpu: 2
              memory: 4Gi
            limits:
              cpu: 2
              memory: 4Gi
          volumeMounts:
            - name: qoder-workspace
              mountPath: /workspace
          startupProbe:
            failureThreshold: 20
            httpGet:
              path: /health
              port: 49999
            initialDelaySeconds: 1
            periodSeconds: 2
            timeoutSeconds: 1
  # Each sandbox gets its own persistent volume for workspace data
  volumeClaimTemplates:
  - metadata:
      name: qoder-workspace
    spec:
      accessModes: ["ReadWriteOnce"]
      # Replace with a StorageClass available in your cluster
      storageClassName: "alicloud-disk-ssd"
      resources:
        requests:
          storage: 20Gi
